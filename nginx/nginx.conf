upstream app_servers {
    # 單一 daphne 實例；nginx 對此名稱的 DNS 只在啟動時解析一次，
    # docker compose --scale 增加副本不會被分流。
    server app:8000;
}

# 受保護媒體的授權快取：鍵為（session, 影片），同一部影片的所有 HLS 片段
# 共用一條授權結果，避免每個 segment 請求都打進 Django
proxy_cache_path /var/cache/nginx/media_auth keys_zone=media_auth:1m max_size=10m inactive=10m;

# 從原始請求 URI 取出授權範圍：HLS 取到影片目錄層、mp4 取完整檔案路徑。
# 來源用 $media_orig_uri 而非 $uri：本 map 在 auth 子請求中求值，當下 $uri
# 是子請求自己的 /__media_auth，原始路徑須由受保護 location 以 set 存入變數
map $media_orig_uri $media_auth_scope {
    ~^/media/hls/(?<hls_dir>[^/]+)/    hls/$hls_dir;
    ~^/media/videos/(?<video_file>.+)$ videos/$video_file;
    default                            "";
}

server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    location /static/ {
        alias /youtube_service/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 公開媒體（縮圖、頭像等）
    location /media/ {
        alias /youtube_service/media/;
        expires 7d;
    }

    # 受保護媒體：nginx 負責送檔，授權交給 Django（auth_request 子請求）。
    # 用 root 而非 alias，URI 與磁碟路徑同構，巢狀 location 繼承才安全
    location /media/hls/ {
        root /youtube_service;
        # 留存正規化後的主請求路徑給 auth 子請求（set 屬 rewrite phase，
        # 巢狀 location 不繼承外層的 set，故內層需重複宣告）
        set $media_orig_uri $uri;
        auth_request /__media_auth;
        expires 1h;

        # 播放清單不可快取，畫質清單更新後客戶端才拿得到新檔
        location ~ \.m3u8$ {
            set $media_orig_uri $uri;
            expires -1;
        }
    }

    location /media/videos/ {
        root /youtube_service;
        set $media_orig_uri $uri;
        auth_request /__media_auth;
        expires 7d;
    }

    location = /__media_auth {
        internal;
        proxy_pass http://app_servers/videos/media-auth/;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # $media_orig_uri 來自主請求的 $uri：已解碼且 dot-segments 已正規化，
        # 授權判斷與實際服務的路徑必然一致（不可用 $request_uri，未正規化）
        proxy_set_header X-Original-URI $media_orig_uri;
        proxy_set_header Host $host;

        proxy_cache media_auth;
        proxy_cache_key "$cookie_sessionid:$media_auth_scope";
        proxy_cache_valid 204 403 60s;
        # TTL 由上行 proxy_cache_valid 決定；忽略 Vary 避免以整串 Cookie 分裂快取
        # （快取鍵已含 sessionid）。Set-Cookie 不忽略：帶 Set-Cookie 的回應不會進快取
        proxy_ignore_headers Cache-Control Expires Vary;
    }

    # 授權端點僅供 auth_request 子請求使用（子請求直連 upstream，不經此 location），
    # 對外回 404，避免外部以流水號探測影片的公開/私有狀態
    location = /videos/media-auth/ {
        return 404;
    }

    location /ws/ {
        proxy_pass http://app_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://app_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
