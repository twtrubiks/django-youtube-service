{% extends "users/base.html" %}

{% block title %}Confirm Delete - {{ video.title }}{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 40px auto;">
        <h2 style="font-size: 22px; font-weight: 700; margin-top: 0; margin-bottom: 16px; color: var(--text);">Confirm Delete</h2>
        <hr>
        <p style="color: var(--text-secondary); margin-bottom: 8px;">Are you sure you want to delete <strong style="color: var(--text);">"{{ video.title }}"</strong>?</p>
        <p style="color: var(--error); margin-bottom: 20px;">This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 8px;">
                <button type="submit" class="button button-danger">Confirm Delete</button>
                <a href="{% url 'videos:video_detail' video.id %}" class="button button-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
