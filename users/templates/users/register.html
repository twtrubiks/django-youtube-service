{% extends "users/base.html" %}

{% block title %}Register - StreamCraft{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-form-container">
    <h2>Create an account</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div style="margin-bottom: 16px;">
        <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
        {{ field }}
        {% for error in field.errors %}
          <p style="color: var(--error); font-size: 13px; margin: 4px 0 0 0;">{{ error }}</p>
        {% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="button" style="width: 100%;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 24px; color: var(--text-secondary);">
      <a href="{% url 'users:login' %}">Already have an account? Log In</a>
    </p>
  </div>
</div>
{% endblock %}
