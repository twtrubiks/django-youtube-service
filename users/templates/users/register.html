{% extends "users/base.html" %}

{% block title %}Register - StreamCraft{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-form-container">
    <h2>Create an account</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        {% include "users/_form_field.html" with field=field %}
      {% endfor %}
      <button type="submit" class="button" style="width: 100%;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 24px; color: var(--text-secondary);">
      <a href="{% url 'users:login' %}">Already have an account? Log In</a>
    </p>
  </div>
</div>
{% endblock %}
