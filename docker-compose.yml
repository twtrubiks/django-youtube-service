
x-base-app-setting: &x-base-app
  image: youtube-service-app
  build: .
  env_file: .env
  volumes:
    - .:/youtube_service

services:

    redis-django:
      container_name: redis
      image: redis:8-alpine
      restart: always
      command: redis-server --appendonly yes
      # ports:
      #   - "6379:6379"
      volumes:
        - redis-django-data:/data
      healthcheck:
        test: ["CMD", "redis-cli", "--raw", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

    worker:
      <<: *x-base-app
      command: celery -A youtube_service worker -l info
      restart: always
      depends_on:
        app:
          condition: service_started
        redis-django:
          condition: service_healthy

    test:
      # 這個服務專門用來跑測試
      # docker compose up   # 啟動常規服務，跳過測試。。
      # docker compose --profile testing up # 啟動所有 被標記 profile: "testing" 的服務
      <<: *x-base-app
      command: bash -c "coverage run manage.py test && coverage report && coverage html"
      # command: bash -c "python manage.py test videos"
      profiles:
        - "testing"
      depends_on:
        redis-django:
          condition: service_healthy

    db-backup:
      image: postgres:18
      env_file: .env
      environment:
        - PGPASSWORD=${DB_PASSWORD:-password123}
      volumes:
        - ./scripts:/scripts:ro
        - db-backups:/backups
      command: >
        sh -c "while true; do
          /scripts/backup_db.sh;
          sleep 86400;
        done"
      profiles:
        - "backup"
      depends_on:
        django-postgres:
          condition: service_healthy

    django-postgres:
      image: postgres:18
      # ports:
      #   - "5432:5432"
      env_file: .env
      environment:
        - POSTGRES_DB=${DB_NAME:-postgres}
        - POSTGRES_USER=${DB_USER:-myuser}
        - POSTGRES_PASSWORD=${DB_PASSWORD:-password123}
        - PGDATA=/var/lib/postgresql/data/pgdata
      volumes:
        - db-data:/var/lib/postgresql/data/pgdata
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myuser}"]
        interval: 10s
        timeout: 5s
        retries: 5

    app:
      <<: *x-base-app
      command: daphne -b 0.0.0.0 -p 8000 youtube_service.asgi:application
      restart: always
      ports:
        - "8000:8000"
      depends_on:
        redis-django:
          condition: service_healthy
        django-postgres:
          condition: service_healthy

volumes:
    redis-django-data:
    db-data:
    db-backups: