# Production overrides: Nginx reverse proxy, no source mount
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# HTTP 由單一 daphne 承載，適合 demo 流量；高並行需另行擴容（nginx 對 upstream 的
# DNS 只在啟動時解析一次，docker compose --scale 增加副本不會被分流）。

x-base-app-setting: &x-base-app
  image: youtube-service-app
  build: .
  env_file: .env
  volumes:
    - media-data:/youtube_service/media
    - static-data:/youtube_service/staticfiles

services:

    nginx:
      image: nginx:alpine
      ports:
        - "80:80"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        - media-data:/youtube_service/media:ro
        - static-data:/youtube_service/staticfiles:ro
      depends_on:
        - app
      restart: always

    worker-transcode:
      <<: *x-base-app

    worker-default:
      <<: *x-base-app

    app:
      <<: *x-base-app
      ports: !reset []
      deploy:
        replicas: 1

volumes:
    media-data:
    static-data:
